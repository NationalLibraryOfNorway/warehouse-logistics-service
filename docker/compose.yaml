# This docker-compose file is used for setting up local development environment with all necessary dependencies
# It includes services for MongoDB, Keycloak, Kafka, and Mockoon for testing callbacks, SynQ, and Kardex compatibility

# Give the docker-compose project a name, which will be used as a prefix for container names and network
name: wls

# Define what services to set up for local development
services:
    # Set up a local mongo instance for local development
  mongo-db:
    image: mongo:8.2.3 # Same as the version in the prod env
    hostname: mongo-db
    entrypoint: >
      /bin/bash -c '
      [ -s /data/keyfile.key ] || { echo "Missing keyfile at /data/keyfile.key"; exit 42; } &&
      chmod 400 /data/keyfile.key || { echo "Failed to set permission '400' on /data/keyfile.key"; exit 67; } &&
      chown mongodb:mongodb /data/keyfile.key || { echo "Failed to make mongodb owner of /data/keyfile.key"; exit 69; } &&
      exec /usr/local/bin/docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/keyfile.key --bind_ip_all --port 27017'
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u root -p toor --quiet --eval \"db.adminCommand('ping')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: wls
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: toor
      GLIBC_TUNABLES: glibc.pthread.rseq=1
    volumes:
      - mongoconfig:/data/configdb
      - mongodata:/data/db
      - mongoshared:/data
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./mongo/secrets/keyfile.key:/data/keyfile.key

  # Initialize replica set + seed data after Mongo is healthy
  mongo-setup:
    image: mongo:8.2.3
    depends_on:
      mongo-db:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c '
      mongosh -u root -p toor --host mongo-db --eval "try {rs.conf()} catch(err) {rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo-db:27017\"}]})}" &&
      mongosh -u root -p toor --host mongo-db --eval "load(\"/docker-entrypoint-initdb.d/mongo-init.js\")"
      '
    volumes:
      - mongoconfig:/data/configdb:ro
      - mongodata:/data/db:ro
      - mongoshared:/data:ro
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  # Set up a local SMTP server for local development
  # Makes GUI available at: http://localhost:8081
  # Useful for testing email sending functionality locally, without spamming actual email accounts
  email:
    image: haravich/fake-smtp-server
    hostname: email
    ports:
      - "1025:1025"
      - "8081:1080"

  # Set up a local keycloak instance for local development
  # Keycloak is configured to automatically import a test realm with service accounts
  # Makes GUI available at: http://localhost:8082
  #
  # When making changes to the realm, export the realm and save it in the keycloak/import folder
  # docker exec -it wls-local-keycloak-1 /opt/keycloak/bin/kc.sh export --file "/tmp/mlt-local-realm-export.json" --users "same_file" --realm "mlt-local"
  # docker cp wls-local-keycloak-1:/tmp/mlt-local-realm-export.json ./docker/keycloak/import/mlt-local-realm-export.json
  # git add docker/keycloak/import/mlt-local-realm-export.json
  # This connects interactively to the container, uses keycloak export command to export the realm, copies the file to the local machine, and adds it to git
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1 # Same as the version in prod env
    hostname: keycloak
    environment:
      KEYCLOAK_ADMIN: wls
      KEYCLOAK_ADMIN_PASSWORD: slw
    ports:
      - "8082:8080"
    command: start-dev --import-realm # Automatically import realm on startup with necessary clients
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import

  # Set up Kafka for local development
  # Kafka is used to send history/statistic messages from Hermes to ElasticSearch
  # To view available topics, you can use "Kafka" plugin for IntelliJ and connect it to localhost:29092
  #
  # This version of Kafka (4.1.1) does not require Zookeper, using KRaft instead
  # The service is configured to use the new features as far as I am aware
  # For some reason "KAFKA_CREATE_TOPICS" environment variable does not work, hence the need for "kafka-topic-setup"
  kafka:
    image: "apache/kafka:4.1.1"
    hostname: kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "9092:9092"    # internal Docker listener (also reachable from host for simple tools)
      - "29092:29092"  # external listener for IntelliJ Kafka plugin
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data/logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
      - kafka-secrets:/etc/kafka/secrets
      - kafka-shared-config:/mnt/shared/config

  # Easy service that waits for Kafka to start and creates a "hermes-mythos" topic
  kafka-topic-setup:
    image: 'apache/kafka:4.1.1'
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ ]
    command: >
      bash -c '
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic hermes-mythos \
        --partitions 1 \
        --replication-factor 1
      '
    volumes:
      - kafka-data:/var/lib/kafka/data:ro
      - kafka-secrets:/etc/kafka/secrets:ro
      - kafka-shared-config:/mnt/shared/config:ro

  # Mockoon allows for easy setup of a mock server for receiving POST calls
  # In our case it is used for locally testing the callback functionality
  mockoon:
    image: mockoon/cli:9.5.0
    hostname: mockoon-callbacks
    ports:
      - "80:8282"
    command: --data /data/wls-callbacks.json --port 8282 --log-transaction
    volumes:
      - ./mockoon/wls-callbacks.json:/data/wls-callbacks.json

  # Also use Mockoon for testing Kardex
  mockoon-kardex:
    image: mockoon/cli:9.5.0
    hostname: mockoon-kardex
    ports:
      - "8182:8182"
    command: --data /data/wls-kardex.json --port 8182 --log-transaction
    volumes:
      - ./mockoon/wls-kardex.json:/data/wls-kardex.json

  # Also use Mockoon for testing the SynQ Controller
  mockoon-synq:
    image: mockoon/cli:9.5.0
    hostname: mockoon-synq
    ports:
      - "8181:8181"
    command: --data /data/wls-synq.json --port 8181 --log-transaction
    volumes:
      - ./mockoon/wls-synq.json:/data/wls-synq.json

volumes:
  # Persistent MongoDB data files (collections, indexes, oplog)
  mongodata:
    driver: local
  # MongoDB runtime/config metadata used by WiredTiger and startup internals
  mongoconfig:
    driver: local
  # Shared mount used by this setup for the keyfile path and init-time artifacts
  mongoshared:
    driver: local
  # Persistent Kafka broker data (KRaft metadata + topic data)
  kafka-data:
    driver: local
  # Kafka secret directory declared by the image
  kafka-secrets:
    driver: local
  # Kafka shared config directory declared by the image
  kafka-shared-config:
    driver: local

networks:
  # Pin the default Compose network subnet to avoid host-network overlap.
  # Without this, Docker may auto-assign a 10.x/172.x subnet that conflicts
  # with corporate/home routing and causes intermittent service-to-service
  # failures (e.g. ECONNREFUSED/timeout between containers).
  default:
    # Bridge keeps all services isolated while still reachable by service name
    # (mongo-db, kafka, keycloak, etc.) through Docker's internal DNS.
    driver: bridge
    ipam:
      config:
        # Chosen private range for stable, conflict-free local networking.
        - subnet: 172.28.0.0/16
